{% extends "layout.html" %}

{% block title %}Profile | AgriMentor{% endblock %}

{% block page_content %}
<section class="shell-page-header">
    <div>
        <h1>Your profile</h1>
        <p>Manage your basic account information.</p>
    </div>
</section>

<section class="shell-card shell-card-narrow">
    <form method="POST" class="shell-form" id="profileForm" novalidate>
        <label id="nameLabelWrap">
            <span>Name</span>
            <input type="text" name="name" id="profileName" value="{{ user.name }}" required minlength="2">
            <span class="validation-error" id="profileNameError" role="alert"></span>
        </label>

        <label>
            <span>Email</span>
            <input type="email" value="{{ user.email }}" disabled>
        </label>

        <label>
            <span>Role</span>
            <input type="text" value="{{ user.role }}" disabled>
        </label>

        <button type="submit" class="shell-btn shell-btn-primary">Save changes</button>
    </form>
</section>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('profileForm');
    var name = document.getElementById('profileName');
    var wrap = document.getElementById('nameLabelWrap');
    var err = document.getElementById('profileNameError');

    function validateName() {
        var valid = true;
        wrap.classList.remove('field-invalid');
        err.textContent = '';
        var val = (name.value || '').trim();
        if (!val) {
            wrap.classList.add('field-invalid');
            err.textContent = 'Please enter your name.';
            valid = false;
        } else if (val.length < 2) {
            wrap.classList.add('field-invalid');
            err.textContent = 'Name must be at least 2 characters.';
            valid = false;
        }
        return valid;
    }

    name.addEventListener('blur', validateName);

    form.addEventListener('submit', function(e) {
        if (!validateName()) {
            e.preventDefault();
        }
    });
});
</script>
{% endblock %}
