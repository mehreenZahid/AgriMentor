{% extends "layouts/dashboard.html" %}

{% block dashboard_content %}

<h1>Farmers</h1>

<table>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Joined</th>
</tr>

{% for farmer in farmers %}
<tr>
    <td>{{ farmer.name }}</td>
    <td>{{ farmer.email }}</td>
    <td>{{ farmer.created_at }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
