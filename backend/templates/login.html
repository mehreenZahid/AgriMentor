<!DOCTYPE html>
<html>

<head>
    <title>Login | AgriMentor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-page">

    <div class="auth-shell">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="auth-subtitle">Sign in to continue to your AgriMentor dashboard.</p>

            <!-- LOGIN FORM -->
            <form method="POST" action="{{ url_for('auth.login_page') }}">

                <input type="email" name="email" placeholder="Email address" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

            </form>

            <!-- GOOGLE LOGIN BUTTON -->
            <div class="auth-secondary-action">
                <a href="{{ url_for('auth.google_login') }}" class="auth-google-btn">
                    Continue with Google
                </a>
            </div>

            <p class="auth-footer-text">
                Don’t have an account?
                <a href="{{ url_for('auth.register_page') }}">Register here</a>
            </p>

        </div>
    </div>

</body>

</html>
